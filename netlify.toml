[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.claude-proxy]
  timeout = 26

[functions.stripe-webhook]
  timeout = 26

[[headers]]
  for = "/portal-center.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/portal-fcc.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
